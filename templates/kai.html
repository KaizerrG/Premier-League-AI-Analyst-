<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #cc0000;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(204, 0, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: #1a1a1a;
            border: 2px solid #1a0000;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #cc0000;
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.3);
        }

        .card-title {
            color: #cc0000;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card-content {
            color: #b0b0b0;
            font-size: 0.95em;
            line-height: 1.6;
        }

        /* Claude Card Specific Styles */
        .claude-card {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-window {
            flex: 1;
            background-color: #0f0f0f;
            border: 1px solid #1a0000;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-window::-webkit-scrollbar {
            width: 8px;
        }

        .chat-window::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: #cc0000;
            border-radius: 4px;
        }

        .chat-window::-webkit-scrollbar-thumb:hover {
            background: #ff0000;
        }

        .message {
            padding: 10px 12px;
            border-radius: 6px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: #cc0000;
            color: #0a0a0a;
            border-left: 3px solid #ff0000;
        }

        .message.claude {
            align-self: flex-start;
            background-color: #2a2a2a;
            color: #b0b0b0;
            border-left: 3px solid #cc0000;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .chat-textarea {
            flex: 1;
            background-color: #0f0f0f;
            border: 1px solid #1a0000;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-textarea:focus {
            border-color: #cc0000;
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.2);
        }

        .chat-textarea::placeholder {
            color: #555;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid #cc0000;
            background-color: transparent;
            color: #cc0000;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #cc0000;
            color: #0a0a0a;
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-send {
            flex: 0 0 100px;
        }

        .btn-clear {
            flex: 0 0 100px;
            border-color: #666;
            color: #666;
        }

        .btn-clear:hover {
            background-color: #666;
            color: #0a0a0a;
            border-color: #666;
        }

        .loading {
            text-align: center;
            color: #cc0000;
            font-style: italic;
            padding: 10px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .help-text {
            font-size: 0.8em;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ KAI Dashboard</h1>

        <div class="grid">
            <!-- Claude AI Chat Card -->
            <div class="card claude-card">
                <div class="card-title">🤖 Claude Assistant</div>
                
                <div class="chat-window" id="chatWindow"></div>

                <div class="input-group">
                    <textarea
                        id="messageInput"
                        class="chat-textarea"
                        placeholder="Ask Claude something... (Enter to send, Shift+Enter for new line)"
                        rows="2"
                    ></textarea>
                    <div class="button-group">
                        <button class="btn btn-send" id="sendBtn">SEND</button>
                        <button class="btn btn-clear" id="clearBtn">CLEAR</button>
                    </div>
                </div>
                <div class="help-text">💡 Tip: Press Enter to send, Shift+Enter for new line</div>
            </div>
        </div>
    </div>

    <script>
        const ANTHROPIC_API_KEY = localStorage.getItem('ANTHROPIC_API_KEY') || '';
        const chatWindow = document.getElementById('chatWindow');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        let claudeHistory = [];
        let isWaitingForResponse = false;

        const SYSTEM_PROMPT = "You are KAI, an embedded AI assistant in a developer dashboard. Be concise and helpful.";

        // Send button click handler
        sendBtn.addEventListener('click', sendMessage);

        // Enter key handler
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Clear button handler
        clearBtn.addEventListener('click', clearChat);

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message || isWaitingForResponse) return;

            if (!ANTHROPIC_API_KEY) {
                alert('⚠️ Please set your ANTHROPIC_API_KEY in localStorage');
                return;
            }

            // Add user message to chat
            addMessageToChat(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Show loading indicator
            isWaitingForResponse = true;
            addMessageToChat('...', 'loading');

            // Build messages for API call
            const messages = [
                ...claudeHistory.map(msg => ({
                    role: msg.role,
                    content: msg.content
                })),
                {
                    role: 'user',
                    content: message
                }
            ];

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': ANTHROPIC_API_KEY,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: SYSTEM_PROMPT,
                        messages: messages
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                const claudeReply = data.content[0].text;

                // Remove loading indicator
                removeLastMessage();

                // Add Claude's reply
                addMessageToChat(claudeReply, 'claude');

                // Update history
                claudeHistory.push({ role: 'user', content: message });
                claudeHistory.push({ role: 'assistant', content: claudeReply });

            } catch (error) {
                removeLastMessage();
                addMessageToChat(`❌ Error: ${error.message}`, 'claude');
            } finally {
                isWaitingForResponse = false;
                messageInput.focus();
            }
        }

        function addMessageToChat(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = text;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeLastMessage() {
            const messages = chatWindow.querySelectorAll('.message');
            if (messages.length > 0) {
                messages[messages.length - 1].remove();
            }
        }

        function clearChat() {
            chatWindow.innerHTML = '';
            claudeHistory = [];
            messageInput.value = '';
            messageInput.focus();
        }

        // Auto-expand textarea
        messageInput.addEventListener('input', (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
        });

        // Prompt for API key on load
        window.addEventListener('load', () => {
            if (!ANTHROPIC_API_KEY) {
                const apiKey = prompt('🔑 Enter your Anthropic API key:');
                if (apiKey) {
                    localStorage.setItem('ANTHROPIC_API_KEY', apiKey);
                    location.reload();
                }
            }
            messageInput.focus();
        });
    </script>
</body>
</html>
